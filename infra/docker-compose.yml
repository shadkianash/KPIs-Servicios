services:
  postgres:
    image: postgres:17-alpine
    container_name: csap-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-kpis_servicios}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-kpis_servicios}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - csap-network

  redis:
    image: redis:7-alpine
    container_name: csap-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - csap-network

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: csap-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      ENV: production
      PROJECT_NAME: "KPIs-Servicios"
      POSTGRES_SERVER: postgres
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-kpis_servicios}
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LOG_LEVEL: INFO
    networks:
      - csap-network

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: csap-frontend
    restart: unless-stopped
    networks:
      - csap-network

  nginx:
    image: nginx:alpine
    container_name: csap-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - csap-network

volumes:
  postgres_data:
    driver: local

networks:
  csap-network:
    driver: bridge
